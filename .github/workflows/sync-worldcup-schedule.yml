name: Sync World Cup Schedule Cache

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch schedule cache
        run: |
          mkdir -p data
          curl -fsSL "https://worldcup26.ir/get/games?_=$(date +%s)" \
            -H "Accept: application/json" \
            -H "Cache-Control: no-cache" \
            -o data/worldcup26-games.json
          node -e "const fs=require('fs'); const payload=JSON.parse(fs.readFileSync('data/worldcup26-games.json','utf8')); const games=payload.games||payload.data||payload; if (!Array.isArray(games) || games.length < 60) throw new Error('Invalid schedule payload');"

      - name: Fetch Polymarket odds cache
        continue-on-error: true
        run: node scripts/sync-polymarket-odds.mjs data/worldcup26-games.json data/polymarket-odds.json

      - name: Sync authoritative prediction markets to Supabase
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync-prediction-markets.mjs data/worldcup26-games.json data/polymarket-odds.json

      - name: Commit schedule cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/worldcup26-games.json data/polymarket-odds.json
          git diff --cached --quiet || git commit -m "Update World Cup schedule cache"
          git push

      - name: Sync settled match results to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync-match-results.mjs data/worldcup26-games.json
