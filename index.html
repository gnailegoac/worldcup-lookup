<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>世界杯比分概率查询</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar" aria-label="世界杯概率查询">
        <div>
          <p class="eyebrow">World Cup Probability Desk</p>
          <h1>世界杯比分概率查询</h1>
        </div>
        <div class="topbar-actions">
          <button class="icon-button" id="addMatchButton" type="button" aria-label="新增比赛" title="新增比赛">
            <span aria-hidden="true">+</span>
          </button>
          <button class="icon-button" id="importButton" type="button" aria-label="导入数据" title="导入数据">
            <span aria-hidden="true">↑</span>
          </button>
          <button class="icon-button" id="exportButton" type="button" aria-label="导出数据" title="导出数据">
            <span aria-hidden="true">↓</span>
          </button>
          <button class="icon-button" id="resetButton" type="button" aria-label="恢复样例数据" title="恢复样例数据">
            <span aria-hidden="true">↻</span>
          </button>
          <input id="importFile" type="file" accept="application/json,.json" hidden />
        </div>
      </header>

      <section class="control-panel" aria-label="查询条件">
        <div class="control-group wide">
          <label for="searchInput">球队 / 场地 / 阶段</label>
          <input id="searchInput" type="search" placeholder="Argentina, 德国, Group J..." autocomplete="off" />
        </div>
        <div class="control-group">
          <label for="referenceInput">查询时间</label>
          <input id="referenceInput" type="datetime-local" />
        </div>
        <div class="control-group">
          <label for="groupFilter">小组</label>
          <select id="groupFilter"></select>
        </div>
        <div class="control-group compact">
          <label for="limitSelect">场数</label>
          <select id="limitSelect">
            <option value="3">3</option>
            <option value="5" selected>5</option>
            <option value="8">8</option>
            <option value="all">全部</option>
          </select>
        </div>
      </section>

      <section class="live-panel" aria-label="实时数据同步">
        <div class="live-copy">
          <span class="live-label">实时数据</span>
          <strong id="liveStatus">未同步</strong>
        </div>
        <div class="live-controls">
          <button class="action-button primary" id="syncScheduleButton" type="button">同步赛程/比分</button>
          <input id="oddsApiKeyInput" type="password" placeholder="The Odds API key" autocomplete="off" />
          <input id="oddsSportKeyInput" type="text" value="soccer_fifa_world_cup" aria-label="The Odds API sport key" />
          <select id="oddsRegionSelect" aria-label="赔率地区">
            <option value="us">US</option>
            <option value="uk">UK</option>
            <option value="eu">EU</option>
            <option value="au">AU</option>
          </select>
          <button class="action-button" id="syncOddsButton" type="button">同步赔率</button>
        </div>
      </section>

      <section class="account-panel" aria-label="用户账号">
        <div class="account-status">
          <span class="live-label">账号</span>
          <strong id="authStatus">未连接 Supabase</strong>
        </div>
        <div class="account-controls">
          <input id="supabaseUrlInput" type="url" placeholder="Supabase URL" autocomplete="off" />
          <input id="supabaseAnonKeyInput" type="password" placeholder="Supabase anon key" autocomplete="off" />
          <button class="action-button" id="connectSupabaseButton" type="button">连接</button>
          <input id="authEmailInput" type="email" placeholder="Email" autocomplete="email" />
          <input id="authPasswordInput" type="password" placeholder="Password" autocomplete="current-password" />
          <button class="action-button primary" id="signInButton" type="button">登录</button>
          <button class="action-button" id="signUpButton" type="button">注册</button>
          <button class="action-button" id="signOutButton" type="button">退出</button>
        </div>
      </section>

      <nav class="tabs" aria-label="比赛范围">
        <button class="tab is-active" type="button" data-view="upcoming">接下来</button>
        <button class="tab" type="button" data-view="history">历史</button>
        <button class="tab" type="button" data-view="all">全部</button>
      </nav>

      <section class="summary-grid" aria-label="概率概览">
        <article class="metric">
          <span class="metric-label">后续比赛</span>
          <strong id="upcomingCount">0</strong>
        </article>
        <article class="metric">
          <span class="metric-label">历史样本</span>
          <strong id="historyCount">0</strong>
        </article>
        <article class="metric metric-wide">
          <span class="metric-label">当前最高倾向</span>
          <strong id="strongestLean">-</strong>
        </article>
      </section>

      <section class="workspace">
        <aside class="match-list" aria-label="比赛列表" id="matchList"></aside>
        <section class="detail-panel" aria-live="polite" id="matchDetail"></section>
      </section>

      <section class="predictions-area" aria-label="用户预测">
        <section class="prediction-list-panel">
          <div class="prediction-list-head">
            <h2 class="section-title">我的历史预测</h2>
            <button class="icon-button small" id="refreshPredictionsButton" type="button" aria-label="刷新预测" title="刷新预测">↻</button>
          </div>
          <div id="myPredictionsList" class="prediction-list"></div>
        </section>
        <section class="prediction-list-panel">
          <div class="prediction-list-head">
            <h2 class="section-title">公开预测</h2>
          </div>
          <div id="publicPredictionsList" class="prediction-list"></div>
        </section>
      </section>
    </main>

    <script src="supabase-config.js"></script>
    <script src="app.js" defer></script>
  </body>
</html>
